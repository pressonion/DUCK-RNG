        :root {

            --shop-bg: rgba(51, 65, 85, 0.8);

        body {
            font-family: 'Nunito', sans-serif; background-size: 400% 400%;

        body.bg-Uncommon { background-image: linear-gradient(-45deg, #0f172a, #0c4a6e, #164e63, #0284c7); }
        body.bg-Rare { background-image: linear-gradient(-45deg, #2e1065, #4c1d95, #3b0764, #1e1b4b); }
        body.bg-Epic { background-image: linear-gradient(-45deg, #4c0519, #881337, #7f1d1d, #450a0a); }
        body.bg-Legendary { background-image: linear-gradient(-45deg, #451a03, #78350f, #b45309, #d97706); }
        body.bg-Mythical { background-image: linear-gradient(-45deg, #000000, #312e81, #0f172a, #831843); }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .main-container {
            background-color: var(--container-bg); backdrop-filter: blur(12px);
            padding: 30px; border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center; width: 480px; position: relative; overflow: hidden;
        }

        h1 { margin-top: 0; margin-bottom: 20px; color: var(--accent); font-weight: 900; font-size: 32px; letter-spacing: 1px; text-shadow: 0 4px 10px rgba(56, 189, 248, 0.4); }
        
        #auth-screen { display: flex; flex-direction: column; gap: 15px; }
        .auth-input { width: 90%; padding: 15px; border-radius: 9999px; border: 1px solid rgba(255,255,255,0.2); background: rgba(15, 23, 42, 0.8); color: white; font-family: inherit; font-size: 16px; font-weight: bold; outline:none; text-align: center; margin: 0 auto;}
        .auth-btn { background: linear-gradient(to bottom, #38bdf8, #0284c7); color: white; font-size: 18px; padding: 15px; box-shadow: 0 8px 20px rgba(2, 132, 199, 0.5); text-transform: uppercase; width: 95%; margin: 10px auto 0; border:none; border-radius:9999px; font-weight:bold; cursor:pointer;}
        .auth-btn:hover { background: linear-gradient(to bottom, #7dd3fc, #0369a1); transform: translateY(-2px); }
        #auth-error { color: #f87171; font-weight: bold; font-size: 14px; min-height: 20px; }
        #saved-accounts-list { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
        .saved-account-badge { background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.4); padding: 8px 16px; border-radius: 9999px; cursor: pointer; font-size:14px; font-weight:bold;}

        #game-screen { display: none; flex-direction: column; }
        .stats-board { display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.6); padding: 12px 20px; border-radius: 9999px; margin-bottom: 20px; font-size: 15px; font-weight: 700; border: 1px solid rgba(255,255,255,0.05); }
        .gold-text { color: var(--gold); }

        #display-area { min-height: 250px; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, rgba(51, 65, 85, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%); border: 2px solid #475569; border-radius: 20px; margin-bottom: 20px; position: relative; box-shadow: inset 0 0 30px rgba(0,0,0,0.8); padding: 20px 0; }
        #duck-stage { display: flex; gap: 15px; justify-content: center; align-items: center; width: 100%; z-index: 2; }
        .duck-spot { display: flex; flex-direction: column; align-items: center; width: 45%; }
        .duck-svg { width: 110px; height: 110px; transition: all 0.3s; }
        
        .rolling .duck-svg { animation: shake 0.3s infinite; filter: brightness(0) drop-shadow(0 0 10px rgba(255,255,255,0.5)); }
        .pop-reveal .duck-svg { animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-1px, -2px) rotate(-5deg); } 50% { transform: translate(-3px, 0px) rotate(5deg); } 75% { transform: translate(3px, 2px) rotate(-5deg); } 100% { transform: translate(1px, -1px) rotate(0deg); } }
        @keyframes popIn { 0% { transform: scale(0.2); opacity: 0; } 60% { transform: scale(1.2); } 100% { transform: scale(1); opacity: 1; } }

        /* Mutations */
        .is-shiny { animation: shinyGlow 2s infinite alternate; }
        @keyframes shinyGlow { from { filter: drop-shadow(0 0 10px #fff) drop-shadow(0 0 15px var(--gold)); } to { filter: drop-shadow(0 0 20px #fff) drop-shadow(0 0 35px #f59e0b); } }
        .is-platinum { filter: grayscale(0.8) brightness(1.4) drop-shadow(0 0 15px var(--plat)); }
        .is-holo { animation: holoGlitch 2s infinite alternate linear; filter: saturate(2.5) contrast(1.2); }
        @keyframes holoGlitch { 0% { filter: saturate(2.5) hue-rotate(0deg) drop-shadow(0 0 15px #ff00ff); } 100% { filter: saturate(2.5) hue-rotate(360deg) drop-shadow(0 0 15px #ffff00); } }
        .is-rad { animation: radPulse 1.5s infinite alternate; filter: brightness(1.2) contrast(1.5); }
        @keyframes radPulse { from { filter: brightness(1.2) drop-shadow(0 0 10px var(--rad)); } to { filter: brightness(1.5) drop-shadow(0 0 40px var(--rad)); } }
        .is-shadow { filter: invert(0.9) hue-rotate(180deg) drop-shadow(0 0 20px var(--shadow)); animation: float 3s infinite ease-in-out;}
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .duck-name { font-size: 22px; font-weight: 900; margin: 10px 0 5px; opacity: 0; }
        .duck-rarity { font-size: 13px; font-weight: 900; padding: 5px 12px; border-radius: 9999px; text-transform: uppercase; display: none; }
        .tag-row { display: flex; gap: 5px; height: 22px; margin-bottom: 5px; flex-wrap: wrap; justify-content:center;}
        .tag { padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 900; display: none; }
        .tag-new { background: #ef4444; color: white; }
        .tag-shiny { background: var(--gold); color: #451a03; }
        .tag-platinum { background: var(--plat); color: #082f49; }
        .tag-holo { background: linear-gradient(45deg, #ff00ff, #00ffff); color: #000; }
        .tag-rad { background: var(--rad); color: #000; }
        .tag-shadow { background: var(--shadow); color: #fff; }

        button { border: none; padding: 14px 20px; font-size: 16px; font-weight: 800; border-radius: 9999px; cursor: pointer; transition: all 0.2s; width: 100%; margin-bottom: 10px; font-family: 'Nunito', sans-serif;}
        #roll-btn { background: linear-gradient(to bottom, #38bdf8, #0284c7); color: white; font-size: 22px; padding: 18px; text-transform: uppercase;}
        #roll-btn:disabled { background: #475569; cursor: not-allowed; color: #94a3b8; }
        .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: space-between;}
        .sub-btn { background-color: rgba(51, 65, 85, 0.7); color: white; border: 1px solid rgba(255,255,255,0.1); width: 48%; margin-bottom: 0; padding: 12px; font-size: 14px;}
        .sub-btn:hover { background-color: rgba(71, 85, 105, 0.9); transform: translateY(-2px); }
        
        .modal { position: absolute; inset: 0; background-color: rgba(15, 23, 42, 0.95); backdrop-filter: blur(15px); border-radius: 30px; display: none; flex-direction: column; padding: 25px; z-index: 10; }
        .modal-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; overflow-y: auto; flex-grow: 1; margin-bottom: 15px; }
        .duck-card { background: rgba(30, 41, 59, 0.8); border-radius: 16px; padding: 12px 5px; text-align: center; border: 2px solid rgba(255,255,255,0.05); position: relative; }

        .duck-count { position: absolute; bottom: -8px; right: -8px; background: var(--accent); color: white; border-radius: 99px; padding: 2px 8px; font-size: 12px; font-weight: 900; z-index: 5;}

        .shop-item { background: var(--shop-bg); padding: 15px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.05); text-align: left; }
        .buy-btn { width: auto; padding: 10px 18px; background: var(--gold); color: #451a03; margin: 0; font-size: 14px; }

        ::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 10px; }
    </style>
</head>

        { id: "cosmic", name: "Cosmic", rarity: "Mythical", weight: 1, color: "#ec4899", svg: { body: "#1A237E", head: "#311B92", beak: "#00BCD4", tail: "#0D47A1", accessory: `<circle cx="40" cy="60" r="2" fill="#FFF"/>` } },
        { id: "void", name: "The Void", rarity: "Mythical", weight: 0.8, color: "#ec4899", svg: { body: "#000000", head: "#000000", beak: "#4c1d95", tail: "#000000", accessory: `<circle cx="45" cy="65" r="2" fill="#c4b5fd"/>` } },
        { id: "quantum", name: "Quantum", rarity: "Mythical", weight: 0.5, color: "#ec4899", svg: { body: "rgba(14, 165, 233, 0.5)", head: "rgba(56, 189, 248, 0.7)", beak: "#fff", tail: "rgba(2, 132, 199, 0.4)", accessory: `<circle cx="50" cy="50" r="35" stroke="#bae6fd" fill="none" stroke-dasharray="5,5"/>` } },
        { id: "nebula", name: "Nebula", rarity: "Mythical", weight: 0.3, color: "#ec4899", svg: { body: "url(#nebula-grad)", head: "#9333EA", beak: "#F0ABFC", tail: "#4C1D95", accessory: `<defs><linearGradient id="nebula-grad"><stop offset="0%" stop-color="#4C1D95"/><stop offset="100%" stop-color="#DB2777"/></linearGradient></defs>` } },
        { id: "seraphim", name: "Seraphim", rarity: "Mythical", weight: 0.2, color: "#ec4899", svg: { body: "#FEF08A", head: "#FEF9C3", beak: "#F59E0B", tail: "#FFF", accessory: `<path d="M 10 30 Q 30 10 50 30 Z" fill="#FFF"/><path d="M 10 60 Q 30 40 50 60 Z" fill="#FFF"/>` } },
        { id: "cthulhu", name: "Cthulhu", rarity: "Mythical", weight: 0.1, color: "#ec4899", svg: { body: "#064E3B", head: "#065F46", beak: "#047857", tail: "#022C22", accessory: `<path d="M 60 40 Q 65 60 60 80" stroke="#047857" stroke-width="3" fill="none"/><path d="M 70 40 Q 75 60 70 80" stroke="#047857" stroke-width="3" fill="none"/>` } }
    ];
    
    const shopData = {
        coinMagnet: { id: 'coinMagnet', name: 'Coin Magnet', desc: 'Doubles coins from rolling.', cost: 150 },
        shinyCharm: { id: 'shinyCharm', name: 'Shiny Charm', desc: 'Triples Shiny chance (15%).', cost: 300 },
        platPolish: { id: 'platPolish', name: 'Platinum Polish', desc: 'Doubles Platinum chance (4%).', cost: 1000 },
        holoMatrix: { id: 'holoMatrix', name: 'Holo Matrix', desc: 'Doubles Holo chance (2%).', cost: 2500 },
        radDetector: { id: 'radDetector', name: 'Rad Detector', desc: 'Doubles Radioactive chance (1%).', cost: 5000 },
        voidOrb: { id: 'voidOrb', name: 'Void Orb', desc: 'Triples Shadow chance (0.3%).', cost: 10000 },
        clickGrease: { id: 'clickGrease', name: 'Click Grease', desc: 'Lowers base roll cooldown.', cost: 1500 }
    };

    const rarityRanks = { "Common": 0, "Uncommon": 1, "Rare": 2, "Epic": 3, "Legendary": 4, "Mythical": 5 };

    let accounts = JSON.parse(localStorage.getItem('duckV11Accounts')) || {};
    let currentUser = null; let saveFile = null;

    // --- Show Saved Accounts on Login Screen ---
    function renderSavedAccounts() {
        const list = document.getElementById('saved-accounts-list');
        list.innerHTML = '';
        for (let user in accounts) {
            let btn = document.createElement('div');
            btn.className = 'saved-account-badge';
            btn.innerText = "👤 " + user;
            btn.onclick = () => {
                document.getElementById('username-input').value = user;
                document.getElementById('password-input').value = accounts[user].password;
            };
            list.appendChild(btn);
        }
    }
    renderSavedAccounts();

    function createDefaultSave() {
        return { 
            unlocked: [], inventory: {}, rolls: 0, coins: 0, upgrades: {},
            mutations: { shiny: [], platinum: [], holo: [], rad: [], shadow: [] }
        };
    }

    // --- Authentication ---
    const userInp = document.getElementById('username-input');
    const passInp = document.getElementById('password-input');
    document.getElementById('login-btn').addEventListener('click', () => {
        const u = userInp.value.trim(); const p = passInp.value.trim(); 
        if(!u || !p) return document.getElementById('auth-error').innerText = "Enter username and password.";
        if(!accounts[u]) accounts[u] = { password: p, saveData: createDefaultSave() };
        if(accounts[u].password === p) {
            currentUser = u; saveFile = accounts[u].saveData;
            if(!saveFile.mutations) saveFile.mutations = { shiny: [], platinum: [], holo: [], rad: [], shadow: [] };
            if(!saveFile.mutations.rad) saveFile.mutations.rad = []; if(!saveFile.mutations.shadow) saveFile.mutations.shadow = [];
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            initGameUI();
        } else { document.getElementById('auth-error').innerText = "Incorrect password."; }
    });

    // --- Core Game Logic ---
    function saveGame() { accounts[currentUser].saveData = saveFile; localStorage.setItem('duckV11Accounts', JSON.stringify(accounts)); updateUI(); }
    
    function updateUI() {
        document.getElementById('roll-count').innerText = saveFile.rolls;
        document.getElementById('collection-count').innerText = saveFile.unlocked.length;
        document.getElementById('coin-count').innerText = saveFile.coins;
        
        // Background
        let highestRank = -1, highestRarity = 'default';
        saveFile.unlocked.forEach(id => {
            const d = duckData.find(x => x.id === id);
            if (d && rarityRanks[d.rarity] > highestRank) { highestRank = rarityRanks[d.rarity]; highestRarity = d.rarity; }
        });
        document.body.className = 'bg-' + highestRarity;
    }

    function initGameUI() {
        document.getElementById('total-ducks').innerText = duckData.length;
        document.getElementById('spot-1').querySelector('.svg-container').innerHTML = generateSVGString({svg:{body:'#475569', head:'#475569', beak:'#334155', tail:'#475569', accessory:''}}, {});
        updateUI();
    }

    function generateSVGString(duck, muts) {
        let classes = 'duck-svg';
        if(muts.shiny) classes += ' is-shiny'; if(muts.plat) classes += ' is-platinum';
        if(muts.holo) classes += ' is-holo'; if(muts.rad) classes += ' is-rad'; if(muts.shadow) classes += ' is-shadow';
        
        return `<svg class="${classes}" viewBox="0 0 100 100">
            ${duck.svg.accessory.includes('<defs>') ? duck.svg.accessory : ''}
            <path d="M 15 50 L 0 30 L 25 55 Z" fill="${duck.svg.tail}" />
            <ellipse cx="45" cy="65" rx="35" ry="25" fill="${duck.svg.body}" />
            <circle cx="70" cy="35" r="18" fill="${duck.svg.head}" />
            <path d="M 85 30 L 100 35 L 85 42 Z" fill="${duck.svg.beak}" />
            <circle cx="75" cy="30" r="3" fill="#0f172a" />
            <g>${duck.svg.accessory.replace(/<defs>.*<\/defs>/,'')}</g>
        </svg>`;
    }

    // --- Anti-Cheat Logic ---
    let clickTimes = [];
    let isLocked = false;
    function checkAutoClicker() {
        const now = Date.now();
        clickTimes.push(now);
        if (clickTimes.length > 10) clickTimes.shift();
        if (clickTimes.length === 10 && (now - clickTimes[0] < 1000)) {
            triggerAntiCheat(); return true;
        }
        return false;
    }

    function triggerAntiCheat() {
        isLocked = true; document.getElementById('anti-cheat-overlay').style.display = 'flex';
        setTimeout(() => { isLocked = false; document.getElementById('anti-cheat-overlay').style.display = 'none'; clickTimes = []; }, 5000);
    }

    // --- Rolling Logic ---
    document.getElementById('roll-btn').addEventListener('click', () => {
        if(isLocked || checkAutoClicker()) return;
        
        let rollBtn = document.getElementById('roll-btn'); rollBtn.disabled = true;
        let area = document.getElementById('display-area');
        area.classList.remove('pop-reveal'); area.classList.add('rolling');
        
        let spot = document.getElementById('spot-1');
        spot.querySelector('.duck-name').style.opacity = '0';
        spot.querySelectorAll('.tag').forEach(t => t.style.display = 'none');

        setTimeout(() => {
            area.classList.remove('rolling'); area.classList.add('pop-reveal');
            
            // Calc Duck
            let totalWeight = duckData.reduce((acc, d) => acc + d.weight, 0);
            let rand = Math.random() * totalWeight;
            let duck = duckData[0];
            for (let d of duckData) { if (rand < d.weight) { duck = d; break; } rand -= d.weight; }

            // Mutations
            let muts = {
                shiny: Math.random() < (saveFile.upgrades.shinyCharm ? 0.15 : 0.05),
                plat: Math.random() < (saveFile.upgrades.platPolish ? 0.04 : 0.02),
                holo: Math.random() < (saveFile.upgrades.holoMatrix ? 0.02 : 0.01),
                rad: Math.random() < (saveFile.upgrades.radDetector ? 0.01 : 0.005),
                shadow: Math.random() < (saveFile.upgrades.voidOrb ? 0.003 : 0.001)
            };

            // Economy
            let cMult = saveFile.upgrades.coinMagnet ? 2 : 1;
            let isNew = !saveFile.unlocked.includes(duck.id);
            if(isNew) { saveFile.unlocked.push(duck.id); saveFile.coins += 25 * cMult; } else { saveFile.coins += 5 * cMult; }
            saveFile.inventory[duck.id] = (saveFile.inventory[duck.id] || 0) + 1;
            saveFile.rolls++;

            if(muts.shiny) { if(!saveFile.mutations.shiny.includes(duck.id)) saveFile.mutations.shiny.push(duck.id); saveFile.coins += 50 * cMult; }
            if(muts.plat) { if(!saveFile.mutations.platinum.includes(duck.id)) saveFile.mutations.platinum.push(duck.id); saveFile.coins += 150 * cMult; }
            if(muts.holo) { if(!saveFile.mutations.holo.includes(duck.id)) saveFile.mutations.holo.push(duck.id); saveFile.coins += 500 * cMult; }
            if(muts.rad) { if(!saveFile.mutations.rad.includes(duck.id)) saveFile.mutations.rad.push(duck.id); saveFile.coins += 1000 * cMult; }
            if(muts.shadow) { if(!saveFile.mutations.shadow.includes(duck.id)) saveFile.mutations.shadow.push(duck.id); saveFile.coins += 5000 * cMult; }

            // Render
            spot.querySelector('.svg-container').innerHTML = generateSVGString(duck, muts);
            spot.querySelector('.duck-name').innerText = duck.name; spot.querySelector('.duck-name').style.opacity = '1';
            
            if(isNew) spot.querySelector('.tag-new').style.display = "block";
            if(muts.shiny) spot.querySelector('.tag-shiny').style.display = "block";
            if(muts.plat) spot.querySelector('.tag-platinum').style.display = "block";
            if(muts.holo) spot.querySelector('.tag-holo').style.display = "block";
            if(muts.rad) spot.querySelector('.tag-rad').style.display = "block";
            if(muts.shadow) spot.querySelector('.tag-shadow').style.display = "block";

            saveGame(); rollBtn.disabled = false;
        }, saveFile.upgrades.clickGrease ? 200 : 500);
    });

    // --- UIs (Shop, Collection, Fusion) ---
    window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; }
    
    document.getElementById('shop-btn').addEventListener('click', () => {
        const list = document.getElementById('shop-list'); list.innerHTML = '';
        Object.values(shopData).forEach(item => {
            let owned = saveFile.upgrades[item.id]; let afford = saveFile.coins >= item.cost;
            list.innerHTML += `<div class="shop-item">
                <div><h3 style="margin:0; color:var(--gold);">${item.name}</h3><p style="margin:0; font-size:12px;">${item.desc}</p></div>
                <button class="buy-btn ${owned ? 'owned' : ''}" ${owned || !afford ? 'disabled' : ''} onclick="buy('${item.id}', ${item.cost})">${owned ? 'Owned' : item.cost + 'C'}</button>
            </div>`;
        });
        document.getElementById('shop-modal').style.display = 'flex';
    });

    window.buy = function(id, cost) {
        if(saveFile.coins >= cost && !saveFile.upgrades[id]) { saveFile.coins -= cost; saveFile.upgrades[id] = true; saveGame(); document.getElementById('shop-btn').click(); }
    };

    document.getElementById('collection-btn').addEventListener('click', () => {
        const grid = document.getElementById('collection-grid'); grid.innerHTML = ''; 
        duckData.forEach(d => {
            const unlocked = saveFile.unlocked.includes(d.id);
            let mini = generateSVGString(d, {}).replace('viewBox="0 0 100 100"', 'viewBox="0 0 100 100" width="50" height="50" style="margin:auto;"');
            if(!unlocked) mini = mini.replace(/fill="[^"]*"/g, 'fill="#475569"');
            
            grid.innerHTML += `<div class="duck-card ${unlocked ? '' : 'locked'}">
                ${unlocked ? `<div class="duck-count">x${saveFile.inventory[d.id] || 0}</div>` : ''}
                ${mini}<div class="card-name">${unlocked ? d.name : '???'}</div>
            </div>`;
        });
        document.getElementById('collection-modal').style.display = 'flex';
    });

    document.getElementById('fusion-btn').addEventListener('click', () => {
        const grid = document.getElementById('fusion-grid'); grid.innerHTML = '';
        duckData.forEach(d => {
            let count = saveFile.inventory[d.id] || 0;
            if(count > 0 && rarityRanks[d.rarity] < 5) { // Cannot fuse Mythicals
                let mini = generateSVGString(d, {}).replace('viewBox="0 0 100 100"', 'width="50" height="50"');
                grid.innerHTML += `<div class="duck-card">
                    <div class="duck-count" style="background:${count>=10?'#10b981':'#ef4444'}">x${count}</div>
                    ${mini}<div class="card-name">${d.name}</div>
                    <button class="fuse-btn" ${count < 10 ? 'disabled' : ''} onclick="fuse('${d.id}')">FUSE 10</button>
                </div>`;
            }
        });
        document.getElementById('fusion-modal').style.display = 'flex';
    });

    window.fuse = function(id) {
        if(saveFile.inventory[id] >= 10) {
            let baseDuck = duckData.find(d => d.id === id);
            let targetRank = rarityRanks[baseDuck.rarity] + 1;
            let possibleTargets = duckData.filter(d => rarityRanks[d.rarity] === targetRank);
            
            let resultDuck = possibleTargets[Math.floor(Math.random() * possibleTargets.length)];
            
            saveFile.inventory[id] -= 10;
            saveFile.inventory[resultDuck.id] = (saveFile.inventory[resultDuck.id] || 0) + 1;
            if(!saveFile.unlocked.includes(resultDuck.id)) saveFile.unlocked.push(resultDuck.id);
            
            saveGame();
            document.getElementById('fusion-btn').click(); // Refresh UI
            alert(`Fusion Successful! You crafted a ${resultDuck.rarity}: ${resultDuck.name}!`);
        }
    };

    document.getElementById('settings-btn').addEventListener('click', () => document.getElementById('settings-modal').style.display='flex');
    document.getElementById('logout-btn').addEventListener('click', () => location.reload());

</script>
</body>
</html>
